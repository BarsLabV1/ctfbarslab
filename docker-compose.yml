version: '3.8'

services:
  # SSH Challenge Server
  ssh-server:
    image: linuxserver/openssh-server:latest
    container_name: ctf-ssh-server
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Istanbul
      - USER_NAME=admin
      - USER_PASSWORD=P@ssw0rd123
      - SUDO_ACCESS=true
    ports:
      - "2222:2222"
    volumes:
      - ./challenges/ssh-data:/config
    restart: unless-stopped
    networks:
      - ctf-network

  # FTP Challenge Server
  ftp-server:
    image: fauria/vsftpd:latest
    container_name: ctf-ftp-server
    environment:
      - FTP_USER=ftpuser
      - FTP_PASS=ftppass123
      - PASV_ADDRESS=127.0.0.1
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - ./challenges/ftp-data:/home/vsftpd
    restart: unless-stopped
    networks:
      - ctf-network

  # Web Challenge - Vulnerable Web App
  web-challenge:
    image: vulnerables/web-dvwa:latest
    container_name: ctf-web-challenge
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - ctf-network

  # Kali Linux for Advanced Challenges
  kali-linux:
    image: kalilinux/kali-rolling:latest
    container_name: ctf-kali
    tty: true
    stdin_open: true
    ports:
      - "2223:22"
    volumes:
      - ./challenges/kali-data:/root
    command: /bin/bash
    restart: unless-stopped
    networks:
      - ctf-network

  # MySQL Database for Challenges
  mysql-challenge:
    image: mysql:8.0
    container_name: ctf-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass123
      - MYSQL_DATABASE=ctf_db
      - MYSQL_USER=ctfuser
      - MYSQL_PASSWORD=ctfpass123
    ports:
      - "3306:3306"
    volumes:
      - ./challenges/mysql-data:/var/lib/mysql
      - ./challenges/mysql-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - ctf-network

networks:
  ctf-network:
    driver: bridge

volumes:
  ssh-data:
  ftp-data:
  kali-data:
  mysql-data:
