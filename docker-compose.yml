version: '3.8'

services:
  # Backend - ASP.NET Core API
  backend:
    build:
      context: ./DetectiveCTF.API
      dockerfile: Dockerfile
    container_name: detective-backend
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5001
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/detectivectf.db
    volumes:
      - ./DetectiveCTF.API/data:/app/data
      - ./DetectiveCTF.API/wwwroot/uploads:/app/wwwroot/uploads
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker için
    networks:
      - ctf-network
    restart: unless-stopped

  # Frontend - React
  frontend:
    build:
      context: ./detective-ctf-frontend
      dockerfile: Dockerfile
    container_name: detective-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5001/api
    depends_on:
      - backend
    networks:
      - ctf-network
    restart: unless-stopped

networks:
  ctf-network:
    driver: bridge
